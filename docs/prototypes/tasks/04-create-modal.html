<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建任务 · 知识库</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1677ff',
            'primary-light': '#e6f4ff',
            urgent: '#ff4d4f',
            warn: '#faad14',
            low: '#8c8c8c',
            done: '#52c41a',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-400 font-sans text-sm text-gray-800">
<!-- 注：背景灰是为了衬托弹窗 mask；实际是叠在列表页上的 Modal -->

<div class="fixed inset-0 bg-black/45 backdrop-blur-[1px] flex items-start justify-center pt-16">
  <div class="bg-white rounded-xl w-[520px] shadow-2xl overflow-hidden">
    <!-- 头部 -->
    <div class="px-5 py-3 flex items-center justify-between border-b">
      <h2 class="font-semibold flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4 text-primary"></i>新建任务</h2>
      <i data-lucide="x" class="w-4 h-4 text-gray-400 hover:text-gray-700 cursor-pointer transition"></i>
    </div>

    <!-- 表单内容 -->
    <div class="p-5 space-y-4">
      <!-- 标题（必填，带 [[ 补全） -->
      <div>
        <input type="text" value="给知识库文档站加评论系统 Giscus" placeholder="做什么？（必填，回车保存）"
               class="w-full text-base font-medium border-b-2 border-primary focus:outline-none px-0 py-1 placeholder-gray-300">
        <p class="text-[10px] text-gray-400 mt-1">提示：可以用 <code class="bg-gray-100 px-1 rounded">[[笔记标题]]</code> 快速挂关联笔记</p>
      </div>

      <!-- 紧急度 + 重要度 -->
      <div class="flex items-center gap-4">
        <div class="flex-1">
          <label class="block text-[10px] text-gray-500 mb-1">紧急度</label>
          <div class="inline-flex bg-gray-100 rounded-md p-0.5 text-xs w-full">
            <button class="flex-1 px-2 py-1 rounded text-urgent hover:bg-white cursor-pointer transition flex items-center justify-center gap-1">
              <span class="w-2 h-2 rounded-full bg-urgent"></span>紧急
            </button>
            <button class="flex-1 px-2 py-1 rounded bg-white shadow-sm text-primary cursor-pointer flex items-center justify-center gap-1">
              <span class="w-2 h-2 rounded-full bg-primary"></span>一般
            </button>
            <button class="flex-1 px-2 py-1 rounded text-gray-500 hover:bg-white cursor-pointer transition flex items-center justify-center gap-1">
              <span class="w-2 h-2 rounded-full bg-low"></span>不急
            </button>
          </div>
        </div>
        <div class="w-32">
          <label class="block text-[10px] text-gray-500 mb-1">重要性（可选）</label>
          <label class="flex items-center gap-1.5 cursor-pointer text-xs">
            <input type="checkbox" class="rounded accent-primary">
            <span>标记为重要</span>
          </label>
        </div>
      </div>

      <!-- 截止时间 -->
      <div>
        <label class="block text-[10px] text-gray-500 mb-1">截止时间</label>
        <div class="flex items-center gap-2">
          <div class="flex-1 flex items-center gap-2 border border-gray-300 rounded-md px-3 py-1.5 text-xs">
            <i data-lucide="calendar" class="w-3.5 h-3.5 text-gray-400"></i>
            <span>2026-04-25（周六）</span>
            <span class="ml-auto text-gray-400">4 天后</span>
          </div>
          <button class="text-[10px] bg-gray-100 rounded px-2 py-1 hover:bg-gray-200 cursor-pointer transition">今天</button>
          <button class="text-[10px] bg-gray-100 rounded px-2 py-1 hover:bg-gray-200 cursor-pointer transition">明天</button>
          <button class="text-[10px] bg-gray-100 rounded px-2 py-1 hover:bg-gray-200 cursor-pointer transition">本周末</button>
        </div>
      </div>

      <!-- 描述 -->
      <div>
        <label class="block text-[10px] text-gray-500 mb-1">描述（可选）</label>
        <textarea rows="2" placeholder="备注 / 上下文"
                  class="w-full border border-gray-300 rounded-md px-3 py-2 text-xs focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none resize-none"></textarea>
      </div>

      <!-- 关联区 -->
      <div>
        <label class="block text-[10px] text-gray-500 mb-1">关联</label>
        <div class="flex flex-wrap items-center gap-2">
          <!-- 已添加 chips -->
          <span class="inline-flex items-center gap-1 bg-blue-50 text-primary text-xs px-2 py-1 rounded">
            <i data-lucide="file-text" class="w-3 h-3"></i>笔记 · 编辑器路线图
            <i data-lucide="x" class="w-3 h-3 hover:text-urgent cursor-pointer"></i>
          </span>
          <span class="inline-flex items-center gap-1 bg-purple-50 text-purple-700 text-xs px-2 py-1 rounded">
            <i data-lucide="folder" class="w-3 h-3"></i>E:/my/桌面软件tauri/knowledge-base-docs
            <i data-lucide="x" class="w-3 h-3 hover:text-urgent cursor-pointer"></i>
          </span>

          <!-- 添加按钮（Dropdown 三种类型） -->
          <div class="relative">
            <button class="inline-flex items-center gap-1 border border-dashed border-gray-300 text-xs px-2 py-1 rounded hover:border-primary hover:text-primary transition cursor-pointer">
              <i data-lucide="plus" class="w-3 h-3"></i>添加关联
            </button>
            <!-- 假设展开的 Dropdown（演示用） -->
            <div class="absolute left-0 top-full mt-1 bg-white border rounded-md shadow-lg py-1 min-w-[160px] z-10">
              <button class="w-full px-3 py-1.5 text-xs text-left hover:bg-gray-50 cursor-pointer flex items-center gap-2 transition">
                <i data-lucide="file-text" class="w-3.5 h-3.5 text-primary"></i>笔记
              </button>
              <button class="w-full px-3 py-1.5 text-xs text-left hover:bg-gray-50 cursor-pointer flex items-center gap-2 transition">
                <i data-lucide="folder" class="w-3.5 h-3.5 text-purple-700"></i>本地文件 / 目录
              </button>
              <button class="w-full px-3 py-1.5 text-xs text-left hover:bg-gray-50 cursor-pointer flex items-center gap-2 transition">
                <i data-lucide="link" class="w-3.5 h-3.5 text-green-600"></i>外部链接
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="px-5 py-3 border-t flex items-center justify-between bg-gray-50">
      <label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer">
        <input type="checkbox" class="rounded accent-primary">
        <span>保存后继续新建下一条（连续记录）</span>
      </label>
      <div class="flex items-center gap-2">
        <button class="text-xs px-4 py-1.5 rounded-md border hover:bg-gray-100 cursor-pointer transition">取消</button>
        <button class="text-xs px-4 py-1.5 rounded-md bg-primary text-white hover:opacity-90 cursor-pointer transition flex items-center gap-1">
          <i data-lucide="check" class="w-3.5 h-3.5"></i>保存
          <span class="text-[10px] opacity-70 ml-1">⌘↵</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>lucide.createIcons();</script>
<!--
================================================================
组件映射（AntD）
================================================================
| 原型元素 | AntD 组件 |
|----------|-----------|
| 弹窗    | Modal |
| 标题输入 | Input（大字号，底边线样式需自定义）|
| 紧急度切换 | Segmented / Radio.Group(optionType=button) |
| 截止时间 | DatePicker + 快捷按钮 Space |
| 描述    | Input.TextArea rows=2 |
| 关联 chip | Tag closable |
| 添加关联 | Dropdown.Button with items |
| 文件选择 | tauri-plugin-dialog open({directory:true}) |
| 提交快捷键 | useEffect 监听 Ctrl/Cmd+Enter |
================================================================
-->
</body>
</html>
